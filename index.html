<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой калькулятор риска</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; padding: 25px; border: 1px solid #ddd; border-radius: 12px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
        .flex-container { display: flex; gap: 15px; }
        .flex-child { flex: 1; }
        button { width: 100%; padding: 12px; margin-top: 20px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
        button:hover { background-color: #218838; }
        .result-table { width: 100%; margin-top: 25px; border-collapse: collapse; display: none; }
        .result-table th, .result-table td { border: 1px solid #eee; padding: 12px; text-align: center; }
        .result-table th { background-color: #f8f9fa; color: #666; }
        .highlight { color: #dc3545; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <h2>Риск на сделку</h2>
    
    <label for="drawdownLeft">Остаток до drawdown ($):</label>
    <input type="number" id="drawdownLeft" value="500">

    <div class="flex-container">
        <div class="flex-child">
            <label for="trades1">Сделок (Сц. 1):</label>
            <input type="number" id="trades1" value="4">
        </div>
        <div class="flex-child">
            <label for="trades2">Сделок (Сц. 2):</label>
            <input type="number" id="trades2" value="6">
        </div>
    </div>

    <button onclick="calculateRiskOnly()">Рассчитать риск</button>

    <table class="result-table" id="resultTable">
        <thead>
            <tr>
                <th>Сценарий</th>
                <th>Сделок</th>
                <th>Риск на сделку</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Вариант 1</td>
                <td id="resTrades1">4</td>
                <td id="risk1" class="highlight">$0</td>
            </tr>
            <tr>
                <td>Вариант 2</td>
                <td id="resTrades2">6</td>
                <td id="risk2" class="highlight">$0</td>
            </tr>
        </tbody>
    </table>

    <script>
        function calculateRiskOnly() {
            const drawdownLeft = parseFloat(document.getElementById('drawdownLeft').value);
            const trades1 = parseInt(document.getElementById('trades1').value);
            const trades2 = parseInt(document.getElementById('trades2').value);

            if (isNaN(drawdownLeft) || isNaN(trades1) || isNaN(trades2)) {
                alert("Пожалуйста, заполните все поля числами");
                return;
            }

            if (trades1 <= 0 || trades2 <= 0) {
                alert("Количество сделок должно быть больше нуля");
                return;
            }

            // Простой расчет: остаток / количество сделок
            const riskPerTrade1 = drawdownLeft / trades1;
            const riskPerTrade2 = drawdownLeft / trades2;

            // Вывод в таблицу
            document.getElementById('resTrades1').innerText = trades1;
            document.getElementById('resTrades2').innerText = trades2;

            document.getElementById('risk1').innerText = `$${riskPerTrade1.toFixed(2)}`;
            document.getElementById('risk2').innerText = `$${riskPerTrade2.toFixed(2)}`;

            // Показываем таблицу
            document.getElementById('resultTable').style.display = 'table';
        }
    </script>
</body>
</html>
