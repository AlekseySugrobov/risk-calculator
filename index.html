<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор риска и Журнал сделок</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 25px; border: 1px solid #ddd; border-radius: 12px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2, h3 { margin-top: 0; color: #333; text-align: center; }
        h3 { margin-top: 25px; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
        .flex-container { display: flex; gap: 15px; }
        .flex-child { flex: 1; }
        button { width: 100%; padding: 12px; margin-top: 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .btn-calc { background-color: #007bff; }
        .btn-calc:hover { background-color: #0056b3; }
        .btn-add { background-color: #28a745; margin-top: 15px; }
        .btn-add:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; padding: 6px 12px; font-size: 0.85em; width: auto; margin: 10px 0; }
        .btn-clear:hover { background-color: #bd2130; }
        .result-table, .history-table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        .result-table th, .result-table td, .history-table th, .history-table td { border: 1px solid #eee; padding: 12px; text-align: center; }
        .result-table th, .history-table th { background-color: #f8f9fa; color: #666; }
        .highlight { color: #dc3545; font-weight: bold; font-size: 1.1em; }
        .profit { color: #28a745; font-weight: bold; }
        .loss { color: #dc3545; font-weight: bold; }
        .radio-box { margin-top: 10px; padding: 10px; border: 1px solid #eee; border-radius: 6px; }
    </style>
</head>
<body>

    <h2>Риск-менеджер и Журнал</h2>
    
    <!-- Блок состояния депозита -->
    <div class="flex-container">
        <div class="flex-child">
            <label for="drawdownLeft">Остаток до drawdown ($):</label>
            <input type="number" id="drawdownLeft" value="500">
        </div>
    </div>

    <!-- Настройка сценариев -->
    <div class="flex-container">
        <div class="flex-child">
            <label for="trades1">Сделок (Сц. 1):</label>
            <input type="number" id="trades1" value="4">
        </div>
        <div class="flex-child">
            <label for="trades2">Сделок (Сц. 2):</label>
            <input type="number" id="trades2" value="6">
        </div>
    </div>

    <button class="btn-calc" onclick="calculateRiskOnly()">Рассчитать риски</button>

    <!-- Таблица расчетов -->
    <table class="result-table" id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>Сценарий</th>
                <th>Сделок</th>
                <th>Риск на сделку</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Вариант 1</td>
                <td id="resTrades1">4</td>
                <td id="risk1" class="highlight">$0</td>
            </tr>
            <tr>
                <td>Вариант 2</td>
                <td id="resTrades2">6</td>
                <td id="risk2" class="highlight">$0</td>
            </tr>
        </tbody>
    </table>

    <!-- Блок добавления сделки в журнал -->
    <h3>Добавить сделку в журнал</h3>
    
    <label for="chosenScenario">Какой сценарий использовали?</label>
    <select id="chosenScenario">
        <option value="1">Сценарий 1</option>
        <option value="2">Сценарий 2</option>
    </select>

    <label for="tradeResult">Результат сделки:</label>
    <select id="tradeResult">
        <option value="win">Выиграл (Take Profit)</option>
        <option value="lose">Проиграл (Stop Loss)</option>
    </select>

    <div id="rewardRatioBox">
        <label for="rewardRatio">Коэффициент прибыли (R:R, например 3 если тейк в 3 раза больше стопа):</label>
        <input type="number" id="rewardRatio" value="3" min="1">
    </div>

    <button class="btn-add" onclick="addTrade()">Зафиксировать сделку в журнал</button>

    <!-- Журнал сделок -->
    <h3>История сделок</h3>
    <button class="btn-clear" onclick="clearHistory()">Очистить журнал</button>
    
    <table class="history-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Сценарий</th>
                <th>Риск</th>
                <th>Результат</th>
                <th>Изменение ($)</th>
            </tr>
        </thead>
        <tbody id="historyBody">
            <!-- Сюда будут добавляться строки из JS -->
        </tbody>
    </table>

    <script>
        // Глобальные переменные для хранения текущих рассчитанных рисков
        let currentRisk1 = 0;
        let currentRisk2 = 0;
        let tradeHistory = [];

        // Переключение видимости R:R в зависимости от исхода сделки
        document.getElementById('tradeResult').addEventListener('change', function() {
            const ratioBox = document.getElementById('rewardRatioBox');
            ratioBox.style.display = this.value === 'win' ? 'block' : 'none';
        });

        function calculateRiskOnly() {
            const drawdownLeft = parseFloat(document.getElementById('drawdownLeft').value);
            const trades1 = parseInt(document.getElementById('trades1').value);
            const trades2 = parseInt(document.getElementById('trades2').value);

            if (isNaN(drawdownLeft) || isNaN(trades1) || isNaN(trades2)) {
                alert("Пожалуйста, заполните все поля числами");
                return;
            }

            currentRisk1 = drawdownLeft / trades1;
            currentRisk2 = drawdownLeft / trades2;

            // Сохраняем настройки формы
            localStorage.setItem('drawdownLeft', drawdownLeft);
            localStorage.setItem('trades1', trades1);
            localStorage.setItem('trades2', trades2);

            document.getElementById('resTrades1').innerText = trades1;
            document.getElementById('resTrades2').innerText = trades2;
            document.getElementById('risk1').innerText = `$${currentRisk1.toFixed(2)}`;
            document.getElementById('risk2').innerText = `$${currentRisk2.toFixed(2)}`;
            document.getElementById('resultTable').style.display = 'table';
        }

        function addTrade() {
            // Перед добавлением убедимся, что риски рассчитаны
            if (currentRisk1 === 0 || currentRisk2 === 0) {
                calculateRiskOnly();
            }

            const drawdownLeftInput = document.getElementById('drawdownLeft');
            let drawdownLeft = parseFloat(drawdownLeftInput.value);
            
            const scenario = document.getElementById('chosenScenario').value;
            const result = document.getElementById('tradeResult').value;
            const ratio = parseFloat(document.getElementById('rewardRatio').value) || 1;

            // Определяем базовый риск для выбранного сценария
            const baseRisk = scenario === "1" ? currentRisk1 : currentRisk2;
            
            let changeUSD = 0;
            if (result === 'win') {
                // Прибыль = риск умноженный на коэффициент R:R
                changeUSD = baseRisk * ratio;
                drawdownLeft += changeUSD;
            } else {
                // Убыток = строго величина риска
                changeUSD = -baseRisk;
                drawdownLeft += changeUSD; // уменьшаем остаток до просадки
            }

            // Обновляем значение в инпуте и пересчитываем риски для следующих сделок
            drawdownLeftInput.value = drawdownLeft.toFixed(2);
            calculateRiskOnly();

            // Добавляем запись в массив истории
            const newTrade = {
                scenario: scenario,
                risk: baseRisk.toFixed(2),
                result: result === 'win' ? 'Выигрыш' : 'Проигрыш',
                change: changeUSD.toFixed(2)
            };

            tradeHistory.push(newTrade);
            localStorage.setItem('tradeHistory', JSON.stringify(tradeHistory));
            
            renderHistory();
        }

        function renderHistory() {
            const body = document.getElementById('historyBody');
            body.innerHTML = '';

            tradeHistory.forEach((trade, index) => {
                const row = document.createElement('tr');
                const isWin = parseFloat(trade.change) > 0;
                
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>Сценарий ${trade.scenario}</td>
                    <td>$${trade.risk}</td>
                    <td class="${isWin ? 'profit' : 'loss'}">${trade.result}</td>
                    <td class="${isWin ? 'profit' : 'loss'}">${isWin ? '+' : ''}$${trade.change}</td>
                `;
                body.appendChild(row);
            });
        }

        function clearHistory() {
            if (confirm("Вы уверены, что хотите полностью очистить журнал сделок?")) {
                tradeHistory = [];
                localStorage.removeItem('tradeHistory');
                renderHistory();
            }
        }

        // Загрузка состояния при старте
        window.onload = function() {
            const savedDrawdown = localStorage.getItem('drawdownLeft');
            const savedTrades1 = localStorage.getItem('trades1');
            const savedTrades2 = localStorage.getItem('trades2');
            const savedHistory = localStorage.getItem('tradeHistory');

            if (savedDrawdown !== null) document.getElementById('drawdownLeft').value = savedDrawdown;
