<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор риска и Журнал</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 650px; margin: 15px auto; padding: 15px 20px; border: 1px solid #ddd; border-radius: 12px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; overflow: hidden; box-sizing: border-box; }
        h2 { margin-top: 0; margin-bottom: 12px; color: #333; text-align: center; font-size: 1.4em; }
        h3 { margin-top: 12px; margin-bottom: 8px; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 3px; font-size: 1.1em; }
        label { display: block; margin-top: 8px; font-weight: bold; color: #555; font-size: 0.9em; }
        
        input[type="number"], select { 
            width: 100%; 
            height: 36px; 
            padding: 0 10px; 
            margin-top: 3px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 0.95em; 
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea {
            width: 100%;
            padding: 8px 10px;
            margin-top: 3px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            resize: vertical; 
            height: 48px;
        }

        input[type="number"]:focus, select:focus, textarea:focus {
            border-color: #007bff;
        }
        
        .radio-group { display: flex; gap: 15px; height: 36px; margin-top: 3px; background: #f8f9fa; padding: 0 12px; border-radius: 6px; border: 1px solid #eee; align-items: center; box-sizing: border-box; }
        .radio-label { display: flex; align-items: center; gap: 6px; margin-top: 0; font-weight: normal; cursor: pointer; color: #333; font-size: 0.95em; }
        .radio-label input { width: auto; margin-top: 0; cursor: pointer; }

        .flex-container { display: flex; gap: 12px; }
        .flex-child { flex: 1; min-width: 0; }
        
        button { width: 100%; padding: 10px; margin-top: 12px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95em; font-weight: bold; }
        .btn-calc { background-color: #007bff; }
        .btn-calc:hover { background-color: #0056b3; }
        .btn-add { background-color: #28a745; margin-top: 12px; }
        .btn-add:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; padding: 5px 10px; font-size: 0.8em; width: auto; margin: 0; }
        .btn-clear:hover { background-color: #bd2130; }
        
        .result-table, .history-table { width: 100%; margin-top: 12px; border-collapse: collapse; }
        .result-table th, .result-table td, .history-table th, .history-table td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 0.9em; }
        .result-table th, .history-table th { background-color: #f8f9fa; color: #666; position: sticky; top: 0; z-index: 10; }
        
        .highlight { color: #dc3545; font-weight: bold; font-size: 1em; }
        .profit { color: #28a745; font-weight: bold; }
        .loss { color: #dc3545; font-weight: bold; }
        .breakeven { color: #6c757d; font-weight: bold; }
        .comment-text { text-align: left !important; font-size: 0.85em; color: #555; max-width: 150px; overflow-wrap: break-word; }
        .time-text { font-size: 0.85em; color: #777; }

        .tabs-header { display: flex; gap: 10px; margin-bottom: 12px; border-bottom: 2px solid #eee; padding-bottom: 6px; }
        .tab-btn { flex: 1; padding: 8px; font-size: 0.95em; font-weight: bold; background-color: #f8f9fa; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background-color: #e9ecef; }
        .tab-btn.active { background-color: #007bff; color: white; border-color: #007bff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .history-scroll-container { max-height: 400px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 6px; }
        .history-table { margin-top: 0; }

        .btn-edit-row { background: none; border: none; color: #007bff; cursor: pointer; font-size: 1.1em; padding: 0; margin: 0; width: auto; }
        .btn-del-row { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 1.1em; padding: 0; margin-left: 8px; width: auto; }

        /* ИСПРАВЛЕННЫЙ DRAWER: абсолютная невидимость в покое и плавный выезд */
        .drawer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 90; }
        .drawer-overlay.open { display: block; }
        
        .drawer { position: absolute; top: 0; right: -320px; width: 290px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease-in-out; z-index: 100; padding: 15px; border-left: 1px solid #ddd; box-sizing: border-box; display: block; visibility: hidden; }
        .drawer.open { right: 0; visibility: visible; }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-close-drawer { background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999; width: auto; padding: 0; margin: 0; }
    </style>
</head>
<body>

    <h2>Риск-менеджер и Журнал</h2>

    <div class="tabs-header">
        <button class="tab-btn active" onclick="switchTab('calcTab', this)">Калькулятор и Вход</button>
        <button class="tab-btn" onclick="switchTab('historyTab', this)">Журнал сделок</button>
    </div>
    
    <div id="calcTab" class="tab-content active">
        <div class="flex-container">
            <div class="flex-child">
                <label>Тип аккаунта:</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="accountType" value="challenge" checked onchange="toggleAccountType()"> Challenge</label>
                    <label class="radio-label"><input type="radio" name="accountType" value="funded" onchange="toggleAccountType()"> Funded</label>
                </div>
            </div>
            <div class="flex-child">
                <label for="accountBalance">Текущий баланс ($):</label>
                <input type="number" id="accountBalance" value="10000" step="0.01">
            </div>
        </div>
        <div class="flex-container">
            <div class="flex-child">
                <label for="drawdownLeft">Остаток до drawdown ($):</label>
                <input type="number" id="drawdownLeft" value="500" step="0.01">
            </div>
            <div class="flex-child" id="maxDrawdownBox">
                <label for="maxDrawdown">Макс. Drawdown ($):</label>
                <input type="number" id="maxDrawdown" value="500" step="0.01">
            </div>
        </div>
        <div class="flex-container">
            <div class="flex-child">
                <label for="trades1">Сделок (Сц. 1):</label>
                <input type="number" id="trades1" value="4">
            </div>
            <div class="flex-child">
                <label for="trades2">Сделок (Сц. 2):</label>
                <input type="number" id="trades2" value="6">
            </div>
        </div>
        <button class="btn-calc" onclick="calculateRiskOnly()">Рассчитать риски</button>
        <table class="result-table" id="resultTable" style="display: none;">
            <thead><tr><th>Сценарий</th><th>Сделок</th><th>Риск на сделку</th></tr></thead>
            <tbody>
                <tr><td>Вариант 1</td><td id="resTrades1">4</td><td id="risk1" class="highlight">$0</td></tr>
                <tr><td>Вариант 2</td><td id="resTrades2">6</td><td id="risk2" class="highlight">$0</td></tr>
            </tbody>
        </table>
        <h3>Добавить сделку в журнал</h3>
        <div class="flex-container">
            <div class="flex-child">
                <label for="chosenScenario">Подставить риск из:</label>
                <select id="chosenScenario" onchange="updateActualRiskInput()">
                    <option value="1">Сценария 1</option>
                    <option value="2">Сценария 2</option>
                </select>
            </div>
            <div class="flex-child">
                <label for="actualRisk">Фактический риск ($):</label>
                <input type="number" id="actualRisk" value="0" step="0.01">
            </div>
        </div>
        <div class="flex-container">
            <div class="flex-child">
                <label for="tradeResult">Результат сделки:</label>
                <select id="tradeResult" onchange="toggleResultInputs()">
                    <option value="win">Выиграл (Take Profit)</option>
                    <option value="lose">Проиграл (Stop Loss)</option>
                    <option value="be">Безубыток</option>
                </select>
            </div>
            <div class="flex-child" id="rewardRatioBox">
                <label for="rewardRatio">R:R:</label>
                <input type="number" id="rewardRatio" value="1" min="0.1" step="0.1">
            </div>
            <div class="flex-child" id="breakevenAmountBox" style="display: none;">
                <label for="beAmount">Сумма ($):</label>
                <input type="number" id="beAmount" value="0" step="0.01">
            </div>
        </div>
        <label for="tradeComment">Комментарий к сделке:</label>
        <textarea id="tradeComment" placeholder="Например: Вход от локального уровня..."></textarea>
        <button class="btn-add" onclick="addTrade()">Зафиксировать сделку в журнал</button>
    </div>

    <div id="historyTab" class="tab-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
            <h3 style="margin: 0; border: none; padding: 0;">История сделок</h3>
            <button class="btn-clear" onclick="clearHistory()">Очистить</button>
        </div>
        <div class="history-scroll-container">
            <table class="history-table">
                <thead><tr><th>#</th><th>Дата</th><th>Риск</th><th>Рез.</th><th>Изм. ($)</th><th>Коммент.</th><th></th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="editDrawer">
        <div class="drawer-header">
            <h3 style="margin:0; border:none; padding-bottom:0;">Ред. сделки</h3>
            <button class="btn-close-drawer" onclick="closeDrawer()">&times;</button>
        </div>
        <input type="hidden" id="editTradeIndex">
        
        <label>Риск ($):</label>
        <input type="number" id="editRisk" step="0.01">
        
        <label>Результат:</label>
        <select id="editResult" onchange="toggleEditResultInputs()">
            <option value="win">Выигрыш</option>
            <option value="lose">Проиграл</option>
            <option value="be">Безубыток</option>
        </select>
        
        <div id="editRRBox">
            <label>R:R:</label>
            <input type="number" id="editRR" step="0.1">
        </div>
        <div id="editBEBox" style="display:none;">
            <label>Сумма результата ($):</label>
            <input type="number" id="editBE" step="0.01">
        </div>
        
        <label>Комментарий:</label>
        <textarea id="editComment"></textarea>
        
        <button class="btn-calc" style="background-color:#28a745" onclick="saveEditedTrade()">Сохранить</button>
    </div>

    <script>
        let calcRisk1 = 0; let calcRisk2 = 0; let tradeHistory = [];

        window.onload = function() {
            ['accountType', 'accountBalance', 'drawdownLeft', 'maxDrawdown', 'trades1', 'trades2'].forEach(key => {
                let val = localStorage.getItem(key);
                if(val) {
                    if(key === 'accountType') document.querySelector(`input[value="${val}"]`).checked = true;
                    else document.getElementById(key).value = val;
                }
            });
            if(localStorage.getItem('tradeHistory')) tradeHistory = JSON.parse(localStorage.getItem('tradeHistory'));
            toggleAccountType(); calculateRiskOnly(); renderHistory();
        };

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active'); btn.classList.add('active'); closeDrawer();
        }

        function toggleAccountType() {
            let type = document.querySelector('input[name="accountType"]:checked').value;
            document.getElementById('maxDrawdownBox').style.display = (type === 'challenge' ? 'block' : 'none');
            localStorage.setItem('accountType', type);
        }

        function toggleResultInputs() {
            let res = document.getElementById('tradeResult').value;
            document.getElementById('rewardRatioBox').style.display = (res === 'win' ? 'block' : 'none');
            document.getElementById('breakevenAmountBox').style.display = (res === 'be' ? 'block' : 'none');
        }

        function toggleEditResultInputs() {
            let res = document.getElementById('editResult').value;
            document.getElementById('editRRBox').style.display = (res === 'win' ? 'block' : 'none');
            document.getElementById('editBEBox').style.display = (res === 'be' ? 'block' : 'none');
        }

        function updateActualRiskInput() {
            let sc = document.getElementById('chosenScenario').value;
            document.getElementById('actualRisk').value = (sc === "1" ? calcRisk1.toFixed(2) : calcRisk2.toFixed(2));
        }

        function calculateRiskOnly() {
            let dl = parseFloat(document.getElementById('drawdownLeft').value) || 0;
            let t1 = parseInt(document.getElementById('trades1').value) || 4;
            let t2 = parseInt(document.getElementById('trades2').value) || 6;
            calcRisk1 = dl / t1; calcRisk2 = dl / t2;
            ['accountBalance', 'drawdownLeft', 'maxDrawdown', 'trades1', 'trades2'].forEach(id => {
                let el = document.getElementById(id);
                if(el) localStorage.setItem(id, el.value);
            });
            document.getElementById('resTrades1').innerText = t1; document.getElementById('resTrades2').innerText = t2;
            document.getElementById('risk1').innerText = `$${calcRisk1.toFixed(2)}`; document.getElementById('risk2').innerText = `$${calcRisk2.toFixed(2)}`;
            document.getElementById('resultTable').style.display = 'table'; updateActualRiskInput();
        }

        function addTrade() {
            let risk = parseFloat(document.getElementById('actualRisk').value) || 0;
            let res = document.getElementById('tradeResult').value;
            if(risk <= 0 && res !== 'be') return alert("Риск должен быть > 0");

            let change = 0;
            let rrValue = document.getElementById('rewardRatio').value;
            let beValue = document.getElementById('beAmount').value;

            if(res === 'win') change = risk * (parseFloat(rrValue) || 1);
            else if(res === 'lose') change = -risk;
            else change = parseFloat(beValue) || 0;

            let trade = {
                time: new Date().toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}),
                risk: risk.toFixed(2),
                resultType: res,
                rr: rrValue,
                change: change.toFixed(2),
                comment: document.getElementById('tradeComment').value.trim() || "—"
            };

            tradeHistory.push(trade);
            applyHistoryEffect(change);
            saveAndRefresh();
            document.getElementById('tradeComment').value = '';
        }

        function applyHistoryEffect(change) {
            let bal = document.getElementById('accountBalance');
            let ddl = document.getElementById('drawdownLeft');
            let max = parseFloat(document.getElementById('maxDrawdown').value) || 0;
            let type = document.querySelector('input[name="accountType"]:checked').value;

            let newBal = parseFloat(bal.value) + parseFloat(change);
            let newDdl = parseFloat(ddl.value) + parseFloat(change);
            if(type === 'challenge' && newDdl > max) newDdl = max;

            bal.value = newBal.toFixed(2); ddl.value = newDdl.toFixed(2);
            calculateRiskOnly();
        }

        function saveAndRefresh() {
            localStorage.setItem('tradeHistory', JSON.stringify(tradeHistory));
            renderHistory();
        }

        function renderHistory() {
            let body = document.getElementById('historyBody'); body.innerHTML = '';
            tradeHistory.slice().reverse().forEach((t, i) => {
                let realIdx = tradeHistory.length - 1 - i;
                let tr = document.createElement('tr');
                let cls = t.change > 0 ? 'profit' : (t.change < 0 ? 'loss' : 'breakeven');
                
                let displayRes = t.resultType === 'win' || t.resultType === 'Выигрыш' ? 'Выигрыш' : 
                                 (t.resultType === 'lose' || t.resultType === 'Проиграл' || t.resultType === 'Проиграш' ? 'Проиграл' : 'Безубыток');
                
                tr.innerHTML = `
                    <td>${realIdx + 1}</td><td class="time-text">${t.time}</td>
                    <td>$${t.risk}</td><td class="${cls}">${displayRes}</td>
                    <td class="${cls}">${t.change > 0 ? '+' : ''}$${t.change}</td>
                    <td class="comment-text">${t.comment}</td>
                    <td><button class="btn-edit-row" onclick="openDrawer(${realIdx})">✏️</button><button class="btn-del-row" onclick="deleteTrade(${realIdx})">&times;</button></td>
                `;
                body.appendChild(tr);
            });
        }

        // ИСПРАВЛЕНО: Полный адаптер старых/новых данных. Значения подтягиваются ВСЕГДА!
        function openDrawer(idx) {
            let t = tradeHistory[idx];
            document.getElementById('editTradeIndex').value = idx;
            document.getElementById('editRisk').value = t.risk;
            
            // Адаптер типов: превращаем кириллицу из старых логов в системные ключи
            let normType = t.resultType;
            if (normType === 'Выигрыш') normType = 'win';
            if (normType === 'Проиграл' || normType === 'Проиграш') normType = 'lose';
            if (normType === 'Безубыток') normType = 'be';
            
            document.getElementById('editResult').value = normType;
            
            // Распределяем данные
            if (normType === 'win') {
                document.getElementById('editRR').value = t.rr || (parseFloat(t.change) / parseFloat(t.risk)).toFixed(1) || 1;
                document.getElementById('editBE').value = 0;
            } else if (normType === 'be') {
                document.getElementById('editBE').value = t.change;
                document.getElementById('editRR').value = 1;
            } else {
                document.getElementById('editRR').value = 1;
                document.getElementById('editBE').value = 0;
            }
            
            document.getElementById('editComment').value = (t.comment === "—") ? "" : t.comment;
            
            // Показываем/скрываем нужные блоки
            toggleEditResultInputs();
            
            // Анимируем появление
            document.getElementById('drawerOverlay').classList.add('open');
            document.getElementById('editDrawer').classList.add('open');
        }

        function closeDrawer() {
            document.getElementById('editDrawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('open');
        }

        function saveEditedTrade() {
            let idx = document.getElementById('editTradeIndex').value;
            let oldChange = parseFloat(tradeHistory[idx].change);
            let res = document.getElementById('editResult').value;
            let risk = parseFloat(document.getElementById('editRisk').value) || 0;
            let newChange = 0;
            let rrValue = document.getElementById('editRR').value;

            if(res === 'win') newChange = risk * (parseFloat(rrValue) || 1);
            else if(res === 'lose') newChange = -risk;
            else newChange = parseFloat(document.getElementById('editBE').value) || 0;

            tradeHistory[idx] = {
                ...tradeHistory[idx],
                risk: risk.toFixed(2),
                resultType: res,
                rr: res === 'win' ? rrValue : '',
                change: newChange.toFixed(2),
                comment: document.getElementById('editComment').value.trim() || "—"
            };

            applyHistoryEffect(newChange - oldChange);
            saveAndRefresh(); closeDrawer();
        }

        function deleteTrade(idx) {
            if(!confirm("Удалить сделку?")) return;
            let oldChange = parseFloat(tradeHistory[idx].change);
            tradeHistory.splice(idx, 1);
            applyHistoryEffect(-oldChange);
            saveAndRefresh();
        }

        function clearHistory() {
            if(!confirm("Очистить весь журнал?")) return;
            tradeHistory = []; localStorage.removeItem('tradeHistory'); renderHistory();
        }
    </script>
</body>
</html>
