<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор риска и Журнал</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 650px; margin: 15px auto; padding: 15px 20px; border: 1px solid #ddd; border-radius: 120px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; overflow-x: hidden; border-radius: 12px; }
        h2 { margin-top: 0; margin-bottom: 12px; color: #333; text-align: center; font-size: 1.4em; }
        h3 { margin-top: 12px; margin-bottom: 8px; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 3px; font-size: 1.1em; }
        label { display: block; margin-top: 8px; font-weight: bold; color: #555; font-size: 0.9em; }
        
        input[type="number"], select { 
            width: 100%; 
            height: 36px; 
            padding: 0 10px; 
            margin-top: 3px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 0.95em; 
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea {
            width: 100%;
            padding: 8px 10px;
            margin-top: 3px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            resize: vertical; 
            height: 48px;
        }

        input[type="number"]:focus, select:focus, textarea:focus {
            border-color: #007bff;
        }
        
        .radio-group { display: flex; gap: 15px; height: 36px; margin-top: 3px; background: #f8f9fa; padding: 0 12px; border-radius: 6px; border: 1px solid #eee; align-items: center; box-sizing: border-box; }
        .radio-label { display: flex; align-items: center; gap: 6px; margin-top: 0; font-weight: normal; cursor: pointer; color: #333; font-size: 0.95em; }
        .radio-label input { width: auto; margin-top: 0; cursor: pointer; }

        .flex-container { display: flex; gap: 12px; }
        .flex-child { flex: 1; min-width: 0; }
        
        button { width: 100%; padding: 10px; margin-top: 12px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95em; font-weight: bold; }
        .btn-calc { background-color: #007bff; }
        .btn-calc:hover { background-color: #0056b3; }
        .btn-add { background-color: #28a745; margin-top: 12px; }
        .btn-add:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; padding: 5px 10px; font-size: 0.8em; width: auto; margin: 0; }
        .btn-clear:hover { background-color: #bd2130; }
        
        .result-table, .history-table { width: 100%; margin-top: 12px; border-collapse: collapse; }
        .result-table th, .result-table td, .history-table th, .history-table td { border: 1px solid #eee; padding: 8px; text-align: center; font-size: 0.9em; }
        .result-table th, .history-table th { background-color: #f8f9fa; color: #666; position: sticky; top: 0; z-index: 10; }
        
        .highlight { color: #dc3545; font-weight: bold; font-size: 1em; }
        .profit { color: #28a745; font-weight: bold; }
        .loss { color: #dc3545; font-weight: bold; }
        .breakeven { color: #6c757d; font-weight: bold; }
        .comment-text { text-align: left !important; font-size: 0.85em; color: #555; max-width: 150px; overflow-wrap: break-word; }
        .time-text { font-size: 0.85em; color: #777; }

        .tabs-header { display: flex; gap: 10px; margin-bottom: 12px; border-bottom: 2px solid #eee; padding-bottom: 6px; }
        .tab-btn { flex: 1; padding: 8px; font-size: 0.95em; font-weight: bold; background-color: #f8f9fa; color: #555; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .tab-btn:hover { background-color: #e9ecef; }
        .tab-btn.active { background-color: #007bff; color: white; border-color: #007bff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; position: relative; }

        .history-scroll-container { max-height: 400px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 6px; }
        .history-table { margin-top: 0; }

        .btn-edit-row { background: none; border: none; color: #007bff; cursor: pointer; font-size: 1.1em; padding: 0; margin: 0; width: auto; }
        .btn-del-row { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 1.1em; padding: 0; margin-left: 8px; width: auto; }

        .drawer { position: absolute; top: 0; right: -300px; width: 280px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: right 0.3s ease; z-index: 100; padding: 15px; border-left: 1px solid #ddd; box-sizing: border-box; }
        .drawer.open { right: 0; }
        .drawer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); display: none; z-index: 90; }
        .drawer-overlay.open { display: block; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-close-drawer { background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999; width: auto; padding: 0; margin: 0; }
    </style>
</head>
<body>

    <h2>Риск-менеджер и Журнал</h2>

    <div class="tabs-header">
        <button class="tab-btn active" onclick="switchTab('calcTab', this)">Калькулятор и Вход</button>
        <button class="tab-btn" onclick="switchTab('historyTab', this)">Журнал сделок</button>
    </div>
    
    <div id="calcTab" class="tab-content active">
        <div class="flex-container">
            <div class="flex-child">
                <label>Тип аккаунта:</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="accountType" value="challenge" checked onchange="toggleAccountType()"> Challenge</label>
                    <label class="radio-label"><input type="radio" name="accountType" value="funded" onchange="toggleAccountType()"> Funded</label>
                </div>
            </div>
            <div class="flex-child">
                <label for="accountBalance">Текущий баланс ($):</label>
                <input type="number" id="accountBalance" value="10000" step="0.01">
            </div>
        </div>
        <div class="flex-container">
            <div class="flex-child">
                <label for="drawdownLeft">Остаток до drawdown ($):</label>
                <input type="number" id="drawdownLeft" value="500" step="0.01">
            </div>
            <div class="flex-child" id="maxDrawdownBox">
                <label for="maxDrawdown">Макс. Drawdown ($):</label>
                <input type="number" id="maxDrawdown" value="500" step="0.01">
            </div>
        </div>
        <div class="flex-container">
            <div class="flex-child">
                <label for="trades1">Сделок (Сц. 1):</label>
                <input type="number" id="trades1" value="4">
            </div>
            <div class="flex-child">
                <label for="trades2">Сделок (Сц. 2):</label>
                <input type="number" id="trades2" value="6">
            </div>
        </div>
        <button class="btn-calc" onclick="calculateRiskOnly()">Рассчитать риски</button>
        <table class="result-table" id="resultTable" style="display: none;">
            <thead><tr><th>Сценарий</th><th>Сделок</th><th>Риск на сделку</th></tr></thead>
            <tbody>
                <tr><td>Вариант 1</td><td id="resTrades1">4</td><td id="risk1" class="highlight">$0</td></tr>
                <tr><td>Вариант 2</td><td id="resTrades2">6</td><td id="risk2" class="highlight">$0</td></tr>
            </tbody>
        </table>
        <h3>Добавить сделку в журнал</h3>
        <div class="flex-container">
            <div class="flex-child">
                <label for="chosenScenario">Подставить риск из:</label>
                <select id="chosenScenario" onchange="updateActualRiskInput()">
                    <option value="1">Сценария 1</option>
                    <option value="2">Сценария 2</option>
                </select>
            </div>
            <div class="flex-child">
                <label for="actualRisk">Фактический риск ($):</label>
                <input type="number" id="actualRisk" value="0" step="0.01">
            </div>
        </div>
        <div class="flex-container">
            <div class="flex-child">
                <label for="tradeResult">Результат сделки:</label>
                <select id="tradeResult" onchange="toggleResultInputs()">
                    <option value="win">Выиграл (Take Profit)</option>
                    <option value="lose">Проиграл (Stop Loss)</option>
                    <option value="be">Безубыток</option>
                </select>
            </div>
            <div class="flex-child" id="rewardRatioBox">
                <label for="rewardRatio">R:R:</label>
                <input type="number" id="rewardRatio" value="1" min="0.1" step="0.1">
            </div>
            <div class="flex-child" id="breakevenAmountBox" style="display: none
