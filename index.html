<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор риска и Журнал</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 650px; margin: 30px auto; padding: 25px; border: 1px solid #ddd; border-radius: 12px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2, h3 { margin-top: 0; color: #333; text-align: center; }
        h3 { margin-top: 25px; text-align: left; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; font-family: Arial, sans-serif; }
        textarea { resize: vertical; height: 60px; }
        
        /* Радио-кнопки (Challenge / Funded) */
        .radio-group { display: flex; gap: 20px; margin-top: 8px; background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
        .radio-label { display: flex; align-items: center; gap: 8px; margin-top: 0; font-weight: normal; cursor: pointer; color: #333; }
        .radio-label input { width: auto; margin-top: 0; cursor: pointer; }

        .flex-container { display: flex; gap: 15px; }
        .flex-child { flex: 1; }
        button { width: 100%; padding: 12px; margin-top: 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .btn-calc { background-color: #007bff; }
        .btn-calc:hover { background-color: #0056b3; }
        .btn-add { background-color: #28a745; margin-top: 15px; }
        .btn-add:hover { background-color: #218838; }
        .btn-clear { background-color: #dc3545; padding: 6px 12px; font-size: 0.85em; width: auto; margin: 10px 0; }
        .btn-clear:hover { background-color: #bd2130; }
        
        .result-table, .history-table { width: 100%; margin-top: 25px; border-collapse: collapse; }
        .result-table th, .result-table td, .history-table th, .history-table td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 0.95em; }
        .result-table th, .history-table th { background-color: #f8f9fa; color: #666; }
        
        /* Стилизация подсветки */
        .highlight { color: #dc3545; font-weight: bold; font-size: 1.1em; }
        .profit { color: #28a745; font-weight: bold; }
        .loss { color: #dc3545; font-weight: bold; }
        .breakeven { color: #6c757d; font-weight: bold; }
        .comment-text { text-align: left !important; font-size: 0.85em; color: #555; max-width: 180px; overflow-wrap: break-word; }
        .time-text { font-size: 0.85em; color: #777; }
    </style>
</head>
<body>

    <h2>Риск-менеджер и Журнал</h2>
    
    <label>Тип аккаунта:</label>
    <div class="radio-group">
        <label class="radio-label">
            <input type="radio" name="accountType" value="challenge" checked onchange="toggleAccountType()"> Challenge
        </label>
        <label class="radio-label">
            <input type="radio" name="accountType" value="funded" onchange="toggleAccountType()"> Funded
        </label>
    </div>

    <div class="flex-container">
        <div class="flex-child">
            <label for="drawdownLeft">Остаток до drawdown ($):</label>
            <input type="number" id="drawdownLeft" value="500" step="0.01">
        </div>
        <div class="flex-child" id="maxDrawdownBox">
            <label for="maxDrawdown">Макс. Drawdown (Лимит, $):</label>
            <input type="number" id="maxDrawdown" value="500" step="0.01">
        </div>
    </div>

    <div class="flex-container">
        <div class="flex-child">
            <label for="trades1">Сделок (Сц. 1):</label>
            <input type="number" id="trades1" value="4">
        </div>
        <div class="flex-child">
            <label for="trades2">Сделок (Сц. 2):</label>
            <input type="number" id="trades2" value="6">
        </div>
    </div>

    <button class="btn-calc" onclick="calculateRiskOnly()">Рассчитать риски</button>

    <table class="result-table" id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>Сценарий</th>
                <th>Сделок</th>
                <th>Риск на сделку</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Вариант 1</td>
                <td id="resTrades1">4</td>
                <td id="risk1" class="highlight">$0</td>
            </tr>
            <tr>
                <td>Вариант 2</td>
                <td id="resTrades2">6</td>
                <td id="risk2" class="highlight">$0</td>
            </tr>
        </tbody>
    </table>

    <h3>Добавить сделку в журнал</h3>
    
    <div class="flex-container">
        <div class="flex-child">
            <label for="chosenScenario">Подставить риск из:</label>
            <select id="chosenScenario" onchange="updateActualRiskInput()">
                <option value="1">Сценария 1</option>
                <option value="2">Сценария 2</option>
            </select>
        </div>
        <div class="flex-child">
            <label for="actualRisk">Фактический риск ($):</label>
            <input type="number" id="actualRisk" value="0" step="0.01">
        </div>
    </div>

    <label for="tradeResult">Результат сделки:</label>
    <select id="tradeResult" onchange="toggleResultInputs()">
        <option value="win">Выиграл (Take Profit)</option>
        <option value="lose">Проиграл (Stop Loss)</option>
        <option value="be">Безубыток (Микро-результат)</option>
    </select>

    <div id="rewardRatioBox">
        <label for="rewardRatio">Коэффициент прибыли (R:R):</label>
        <input type="number" id="rewardRatio" value="3" min="1" step="0.1">
    </div>

    <div id="breakevenAmountBox" style="display: none;">
        <label for="beAmount">Сумма микро-результата ($):</label>
        <input type="number" id="beAmount" value="0" step="0.01">
    </div>

    <label for="tradeComment">Комментарий к сделке:</label>
    <textarea id="tradeComment" placeholder="Например: Вход от локального уровня..."></textarea>

    <button class="btn-add" onclick="addTrade()">Зафиксировать сделку в журнал</button>

    <h3>История сделок</h3>
    <button class="btn-clear" onclick="clearHistory()">Очистить журнал</button>
    
    <table class="history-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Дата / Время</th>
                <th>Риск</th>
                <th>Результат</th>
                <th>Изменение ($)</th>
                <th>Комментарий</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>

    <script>
        let calcRisk1 = 0;
        let calcRisk2 = 0;
        let tradeHistory = [];

        window.onload = function() {
            if (localStorage.getItem('accountType')) {
                const savedType = localStorage.getItem('accountType');
                document.querySelector(`input[name="accountType"][value="${savedType}"]`).checked = true;
            }
            if (localStorage.getItem('drawdownLeft')) {
                document.getElementById('drawdownLeft').value = localStorage.getItem('drawdownLeft');
            }
            if (localStorage.getItem('maxDrawdown')) {
                document.getElementById('maxDrawdown').value = localStorage.getItem('maxDrawdown');
            }
            if (localStorage.getItem('trades1')) {
                document.getElementById('trades1').value = localStorage.getItem('trades1');
            }
            if (localStorage.getItem('trades2')) {
                document.getElementById('trades2').value = localStorage.getItem('trades2');
            }
            if (localStorage.getItem('tradeHistory')) {
                tradeHistory = JSON.parse(localStorage.getItem('tradeHistory'));
            }
            toggleAccountType();
            calculateRiskOnly();
            renderHistory();
        };

        function toggleAccountType() {
            const accountType = document.querySelector('input[name="accountType"]:checked').value;
            const maxDrawdownBox = document.getElementById('maxDrawdownBox');
            
            if (accountType === 'challenge') {
                maxDrawdownBox.style.display = 'block';
            } else {
                maxDrawdownBox.style.display = 'none';
            }
            localStorage.setItem('accountType', accountType);
        }

        function toggleResultInputs() {
            const resultType = document.getElementById('tradeResult').value;
            const ratioBox = document.getElementById('rewardRatioBox');
            const beBox = document.getElementById('breakevenAmountBox');
            if (ratioBox && beBox) {
                ratioBox.style.display = resultType === 'win' ? 'block' : 'none';
                beBox.style.display = resultType === 'be' ? 'block' : 'none';
            }
        }

        function updateActualRiskInput() {
            const scenario = document.getElementById('chosenScenario').value;
            const actualRiskInput = document.getElementById('actualRisk');
            if (actualRiskInput) {
                actualRiskInput.value = scenario === "1" ? calcRisk1.toFixed(2) : calcRisk2.toFixed(2);
            }
        }

        function calculateRiskOnly() {
            const drawdownLeft = parseFloat(document.getElementById('drawdownLeft').value) || 0;
            const trades1 = parseInt(document.getElementById('trades1').value) || 4;
            const trades2 = parseInt(document.getElementById('trades2').value) || 6;

            calcRisk1 = drawdownLeft / trades1;
            calcRisk2 = drawdownLeft / trades2;

            localStorage.setItem('drawdownLeft', drawdownLeft);
            localStorage.setItem('maxDrawdown', parseFloat(document.getElementById('maxDrawdown').value) || 0);
            localStorage.setItem('trades1', trades1);
            localStorage.setItem('trades2', trades2);

            document.getElementById('resTrades1').innerText = trades1;
            document.getElementById('resTrades2').innerText = trades2;
            document.getElementById('risk1').innerText = `$${calcRisk1.toFixed(2)}`;
            document.getElementById('risk2').innerText = `$${calcRisk2.toFixed(2)}`;
            document.getElementById('resultTable').style.display = 'table';

            updateActualRiskInput();
        }

        function addTrade() {
            const drawdownLeftInput = document.getElementById('drawdownLeft');
            let drawdownLeft = parseFloat(drawdownLeftInput.value) || 0;
            const accountType = document.querySelector('input[name="accountType"]:checked').value;
            const maxDrawdown = parseFloat(document.getElementById('maxDrawdown').value) || 0;
            
            const result = document.getElementById('tradeResult').value;
            const ratio = parseFloat(document.getElementById('rewardRatio').value) || 1;
            const beAmount = parseFloat(document.getElementById('beAmount').value) || 0;
            const userRisk = parseFloat(document.getElementById('actualRisk').value) || 0;
            const commentInput = document.getElementById('tradeComment');
            const comment = commentInput.value.trim() || "—";

            if (userRisk <= 0 && result !== 'be') {
                alert("Укажите сумму фактического риска (больше 0)");
                return;
            }
            
            let changeUSD = 0;
            let resultText = '';
            let statusClass = '';

            if (result === 'win') {
                changeUSD = userRisk * ratio;
                resultText = 'Выигрыш';
                statusClass = 'profit';
            } else if (result === 'lose') {
                changeUSD = -userRisk;
                resultText = 'Проигрыш';
                statusClass = 'loss';
            } else if (result === 'be') {
                changeUSD = beAmount;
                statusClass = 'breakeven';
                if (beAmount > 0) resultText = `БУ (+${beAmount}$)`;
                else if (beAmount < 0) resultText = `БУ (${beAmount}$)`;
                else resultText = 'Безубыток';
            }

            drawdownLeft += changeUSD;

            // Ограничение лимита просадки для Challenge аккаунта
            if (accountType === 'challenge' && drawdownLeft > maxDrawdown) {
                drawdownLeft = maxDrawdown;
            }

            drawdownLeftInput.value = drawdownLeft.toFixed(2);
            calculateRiskOnly();

            const now = new Date();
            const timeString = now.toLocaleDateString('ru-RU') + ' ' + now.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});

            const newTrade = {
                time: timeString,
                risk: userRisk.toFixed(2),
                result: resultText,
                change: changeUSD.toFixed(2),
                comment: comment,
                statusClass: statusClass
            };

            tradeHistory.push(newTrade);
            localStorage.setItem('tradeHistory', JSON.stringify(tradeHistory));
            commentInput.value = '';
            
            renderHistory();
        }

        function renderHistory() {
            const body = document.getElementById('historyBody');
            if (!body) return;
            
            body.innerHTML = '';
            
            for (let i = tradeHistory.length - 1; i >= 0; i--) {
                const trade = tradeHistory[i];
                const tr = document.createElement('tr');
                
                let changeStyle = 'breakeven';
                if (parseFloat(trade.change) > 0) changeStyle = 'profit';
                if (parseFloat(trade.change) < 0) changeStyle = 'loss';

                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td class="time-text">${trade.time}</td>
                    <td>$${trade.risk}</td>
                    <td class="${trade.statusClass || ''}">${trade.result}</td>
                    <td class="${changeStyle}">${parseFloat(trade.change) > 0 ? '+' : ''}$${trade.change}</td>
                    <td class="comment-text">${trade.comment}</td>
                `;
                body.appendChild(tr);
            }
        }

        function clearHistory() {
            if (confirm("Вы уверены, что хотите очистить весь журнал сделок?")) {
                tradeHistory = [];
                localStorage.removeItem('tradeHistory');
                renderHistory();
            }
        }
    </script>
</body>
</html>
